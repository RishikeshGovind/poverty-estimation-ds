services:
  - type: web
    name: africalens-api
    runtime: python
    buildCommand: pip install fastapi uvicorn httpx google-genai
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ACLED_API_KEY
        sync: false
      - key: ACLED_EMAIL
        sync: false
