data:
  survey_path: data/dhs_survey.csv
  image_path: data/raw/kenya_sentinel2.tif
  patches_dir: data/patches
  training_csv: data/training_dataset.csv
  predictions_csv: data/predictions.csv
  # Sentinel-1 and VIIRS outputs
  sentinel1_path: data/raw/kenya_sentinel1.tif
  viirs_path: data/raw/kenya_viirs.tif

sentinel2:
  bbox: [36.7, -1.35, 36.9, -1.15]
  date_range: "2023-01-01/2023-12-31"
  max_cloud_cover: 10
  normalization_factor: 10000

sentinel1:
  bbox: [36.7, -1.35, 36.9, -1.15]
  date_range: "2023-01-01/2023-12-31"
  # VV = co-polarization (structure/roughness), VH = cross-polarization (vegetation/volume)
  polarizations: ["vv", "vh"]
  # S1 RTC backscatter is linear power scale; clip to [0, 0.5] before /0.5 to [0, 1]
  normalization_clip: 0.5

viirs:
  bbox: [36.7, -1.35, 36.9, -1.15]
  # NASA Earthdata short name for VIIRS monthly Black Marble gap-filled composites
  short_name: "VNP46A2"
  year: 2023
  # Radiance values in nW/cm²/sr; bright urban ~200, rural dark ~0–5
  normalization_clip: 200.0

dhs:
  # Leave blank to use synthetic data. Set these after registering at dhsprogram.com.
  # GPS cluster file: CSV/shapefile with DHSCLUST, LATNUM, LONGNUM columns
  gps_path: ""
  # Household recode: Stata .DTA file with hv001 (cluster ID) and hv271 (wealth score)
  hr_path: ""
  # hv271 is stored as score * 100000 in DHS files
  wealth_scale_factor: 100000

training:
  batch_size: 16
  epochs: 20
  lr: 1.0e-4
  split: 0.8
  patch_size: 256
  model_dir: outputs/models
  checkpoint: outputs/models/best_model.pth
  loss_plot: outputs/metrics/loss_plot.png

evaluation:
  checkpoint: outputs/models/best_model.pth
  scatter_plot: outputs/metrics/scatter_plot.png

scoring:
  output_geojson: docs/data/predictions.geojson
  sdg1:
    min: -2.0     # Poorest DHS wealth index
    max:  2.0     # Wealthiest DHS wealth index
  sdg7:
    ntl_threshold: 0.2   # Normalised NTL value that maps to 100% score
  sdg11:
    buildup_threshold: 0.3  # S2 brightness that maps to 100% score

api:
  host: "127.0.0.1"
  port: 8000
  # Set to your deployed API URL when hosting; "*" is fine for local dev
  cors_origins: ["*"]
  geojson_path: docs/data/predictions.geojson

model:
  dropout_p: 0.3        # MC Dropout probability; 0 = no dropout
  mc_samples: 50        # Forward passes for uncertainty estimation

# ── NTL Pretraining (sustainlab technique) ────────────────────────────────────
# Stage 1: train ResNet to predict VIIRS nighttime lights from S2 patches.
# The pretrained backbone is then loaded by trainer.py as a warm start.
pretrain_ntl:
  epochs: 10
  lr: 1.0e-4
  checkpoint: outputs/models/pretrain_ntl_backbone.pth

# ── Multi-stream model ────────────────────────────────────────────────────────
# One ResNet18 encoder per sensor; fused in an MLP head.
multistream:
  checkpoint: outputs/models/multistream_best.pth

# ─────────────────────────────────────────────────────────────────────────────
# Phase 1 — Alternative label sources
# ─────────────────────────────────────────────────────────────────────────────
lsms:
  output_csv: data/lsms_survey.csv
  countries:
    # Download from https://www.worldbank.org/en/programs/lsms/initiatives/lsms-ISA
    # Set paths after downloading the Stata .dta files for each country.
    Ethiopia: { household_path: "", gps_path: "" }
    Nigeria:  { household_path: "", gps_path: "" }
    Tanzania: { household_path: "", gps_path: "" }
    Uganda:   { household_path: "", gps_path: "" }

kidsat:
  output_dir: data/kidsat
  # Set max_samples to a small number for testing; null = all 33k
  max_samples: null

# ─────────────────────────────────────────────────────────────────────────────
# Phase 2 — ESA WorldCover + Meta HRSL (new image channels)
# ─────────────────────────────────────────────────────────────────────────────
worldcover:
  year: "2021"
  tiles_dir: data/raw/worldcover
  patches_dir: data/patches/worldcover
  normalization_clip: 1.0   # classes already divided by 100 → [0, 1]

hrsl:
  tiles_dir: data/raw/hrsl
  patches_dir: data/patches/hrsl
  normalization_clip: 1.0   # clipped /1000 → [0, 1] in extract function
  countries: [Kenya, Nigeria, Ethiopia, Ghana, Tanzania, Rwanda, Malawi]

# ─────────────────────────────────────────────────────────────────────────────
# Phase 3 — Building density channel
# ─────────────────────────────────────────────────────────────────────────────
buildings:
  cache_dir: data/raw/buildings
  patches_dir: data/patches/buildings
  normalization_clip: 1.0   # density already normalised in extractor
  source: "google"          # "google" | "microsoft"

# ─────────────────────────────────────────────────────────────────────────────
# Phase 4 — Landsat (SWIR + 40-year history)
# ─────────────────────────────────────────────────────────────────────────────
landsat:
  bbox: [36.7, -1.35, 36.9, -1.15]   # same as sentinel2.bbox
  date_range: "2023-01-01/2023-12-31"
  max_cloud_cover: 10
  output_path: data/raw/landsat.tif
  patches_dir: data/patches/landsat
  normalization_factor: 1.0   # extract_landsat_patch already scales to [0,1]

# ─────────────────────────────────────────────────────────────────────────────
# Phase 5 — OSM accessibility features
# ─────────────────────────────────────────────────────────────────────────────
osm:
  # max_clusters: null means process all; set to 10 for a quick test
  max_clusters: null
  radius_amenity_m: 5000
  radius_road_m: 5000

# Multi-task SDG proxy heads
tasks:
  names: [sdg1_wealth, sdg7_ntl, sdg11_buildup]
  weights:
    sdg1_wealth:  1.0   # Primary task — DHS wealth index
    sdg7_ntl:     0.5   # SDG 7 proxy — VIIRS nighttime radiance (energy access)
    sdg11_buildup: 0.5  # SDG 11 proxy — S2 mean brightness (built-up area)
  # Human-readable metadata (used in visualisation / scoring layer)
  definitions:
    sdg1_wealth:   {sdg: "SDG 1",  name: "No Poverty",        proxy: "DHS Wealth Index"}
    sdg7_ntl:      {sdg: "SDG 7",  name: "Clean Energy",       proxy: "VIIRS Nighttime Lights"}
    sdg11_buildup: {sdg: "SDG 11", name: "Sustainable Cities", proxy: "S2 Mean Brightness"}

spatial_cv:
  country_col: country
  min_test_samples: 5   # Skip a country if it has fewer points than this
  output: outputs/experiments/spatial_cv_results.csv

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
